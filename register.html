<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PayrollPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card register-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-coins"></i>
                    <h1>PayrollPro</h1>
                </div>
                <p class="subtitle">Create your account to get started</p>
            </div>

            <form id="regForm" class="auth-form">
                <div id="alertBox" class="alert"></div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="fn"><i class="fas fa-user"></i> First Name</label>
                        <input type="text" id="fn" required placeholder="John">
                    </div>
                    <div class="form-group">
                        <label for="ln"><i class="fas fa-user"></i> Last Name</label>
                        <input type="text" id="ln" required placeholder="Doe">
                    </div>
                </div>

                <div class="form-group">
                    <label for="u"><i class="fas fa-user-circle"></i> Username</label>
                    <input type="text" id="u" required placeholder="johndoe123">
                </div>

                <div class="form-group">
                    <label for="em"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="em" required placeholder="john@example.com">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cn"><i class="fas fa-phone"></i> Contact</label>
                        <input type="tel" id="cn" required placeholder="+639123456789">
                    </div>
                    <div class="form-group">
                        <label for="sx"><i class="fas fa-venus-mars"></i> Gender</label>
                        <select id="sx" required>
                            <option value="">Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="ad"><i class="fas fa-map-marker-alt"></i> Address</label>
                    <textarea id="ad" required placeholder="123 Main Street, Manila"></textarea>
                </div>

                <div class="form-group">
                    <label for="p"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="p" required placeholder="••••••••">
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" required> I agree to the <a href="#" style="color: var(--primary); text-decoration: none;">Terms & Conditions</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>

                <p class="auth-footer">
                    Already have an account? <a href="login.html">Sign in here</a>
                </p>
            </form>
        </div>

        <div class="auth-info">
            <div class="info-content">
                <i class="fas fa-rocket info-icon"></i>
                <h2>Join PayrollPro Today</h2>
                <p>Get started in minutes and enjoy seamless payroll management.</p>
                <ul class="feature-list">
                    <li><i class="fas fa-check"></i> Quick setup process</li>
                    <li><i class="fas fa-check"></i> Instant access to dashboard</li>
                    <li><i class="fas fa-check"></i> Full data encryption</li>
                    
                </ul>
            </div>
        </div>
    </div>

    <script>
        // Toggle password
        document.querySelector('.toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('p');
            const icon = this;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Show alerts
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            alertBox.className = `alert show alert-${type}`;
            
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 4000);
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
